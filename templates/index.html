<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank | Customer Support</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         background-color: #9dc5e1; margin: 0; }
        .navbar { background-color: #003366; color: white; padding: 15px;; text-align: center;
             font-size: 24px; font-weight: bold; }
        .logo { font-size: 28px; font-weight: bold; letter-spacing: 1px; text-align:start; }
        .container { max-width: 1000px; margin: 60px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #chat-window { height: 500px; border: 1px solid #ddd; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: #fafafa; }
        .msg { margin: 10px 0; padding: 10px; border-radius: 10px; max-width: 70%; }
        .user-msg { align-self: flex-end; background-color: #003366; color: white; }
        .bot-msg { align-self: flex-start; background-color: #e1e1e1; color: #333; }
        .input-area { display: flex; margin-top: 15px; gap: 10px; }
        input { flex: 1; padding: 18px 25px; font-size: 18px; border: 2px solid #ddd; border-radius: 30px; outline: none; }
        button { padding: 10px 20px; background: #003366; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>
    


    <div class="navbar"><div class="logo">
    <img src="{{ url_for('static', filename='secure bank.png') }}" alt="SecureBank Logo"    style="height: 50px; vertical-align: middle;">
    SECUREBANK
</div>
        SecureBank Online</div>
    <div class="container">
        <h3>How can we help you today?</h3>
        <div id="chat-window">
            <div class="msg bot-msg">Welcome to SecureBank! I am your virtual assistant. You can ask me about opening accounts, credit cards, or loan eligibility.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your query here..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }
        async function sendMessage() {
    let input = document.getElementById("userInput");
    let chatWindow = document.getElementById("chat-window");
    if(!input.value.trim()) return;

    
    chatWindow.innerHTML += `<div class="msg user-msg">${input.value}</div>`;
    let userMsg = input.value;
    input.value = "";
    chatWindow.scrollTop = chatWindow.scrollHeight;

    
    let response = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: userMsg})
    });

    let data = await response.json(); 
    
    let formattedReply = data.reply
        .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>') 
        .replace(/\n/g, '<br>');

    chatWindow.innerHTML += `<div class="msg bot-msg">${formattedReply}</div>`;
    chatWindow.scrollTop = chatWindow.scrollHeight;
}

    </script>
</body>
</html>
